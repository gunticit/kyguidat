services:
  # ===========================================
  # GOLANG API GATEWAY
  # ===========================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: khodat-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=khodat
      - DB_USERNAME=khodat
      - DB_PASSWORD=khodat123
      - JWT_SECRET=your-super-secret-jwt-key
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # ===========================================
  # LARAVEL SÀN ĐẤT (Public Website)
  # ===========================================
  san-dat:
    build:
      context: ./san-dat
      dockerfile: Dockerfile
    container_name: khodat-san-dat
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./san-dat:/var/www/html
      - sandat-vendor:/var/www/html/vendor
    environment:
      - GOLANG_API_URL=http://api-gateway:8080
    networks:
      - khodat-network
    depends_on:
      - api-gateway

  # ===========================================
  # VUE ADMIN DASHBOARD
  # ===========================================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: khodat-admin
    restart: unless-stopped
    ports:
      - "8089:80"
    volumes:
      - ./admin:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080/api
    networks:
      - khodat-network
    depends_on:
      - api-gateway

  # ===========================================
  # LARAVEL BACKEND (User API)
  # ===========================================
  backend:
    build:
      context: ./clients/backend
      dockerfile: Dockerfile
    container_name: khodat-backend
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8015:8000"
    volumes:
      - ./clients/backend:/var/www
      - backend-vendor:/var/www/vendor
      - ./clients/backend/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - khodat-network
    depends_on:
      - mysql
      - redis
    command: >
      sh -c "composer install --no-dev --optimize-autoloader --no-interaction && php artisan serve --host=0.0.0.0 --port=8000"

  # ===========================================
  # NEXT.JS FRONTEND (User Dashboard)
  # ===========================================
  frontend:
    build:
      context: ./clients/frontend
      dockerfile: Dockerfile
    container_name: khodat-frontend
    restart: unless-stopped
    ports:
      - "3015:3000"
    volumes:
      - ./clients/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8015/api
    networks:
      - khodat-network
    depends_on:
      - backend

  # ===========================================
  # DATABASE & CACHE
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: khodat-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: khodat
      MYSQL_USER: khodat
      MYSQL_PASSWORD: khodat123
    ports:
      - "3321:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - khodat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: khodat-redis
    restart: unless-stopped
    ports:
      - "6394:6379"
    volumes:
      - redis-data:/data
    networks:
      - khodat-network
    command: redis-server --appendonly yes

  # ===========================================
  # SOCKET.IO SERVER (Real-time Support Chat)
  # ===========================================
  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
    container_name: khodat-socket
    restart: unless-stopped
    ports:
      - "3020:3020"
    volumes:
      - ./socket:/app
      - /app/node_modules
    environment:
      - PORT=3020
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=http://localhost:3015,http://localhost:8089
    networks:
      - khodat-network
    depends_on:
      - redis
      - backend
    command: npx nodemon server.js

  # ===========================================
  # ELASTICSEARCH (Full-text Search)
  # ===========================================
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: khodat-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - khodat-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===========================================
  # MINIO (S3-Compatible Object Storage)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: khodat-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: khodat_minio
      MINIO_ROOT_PASSWORD: khodat_minio_secret
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - khodat-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # TOOLS & UTILITIES
  # ===========================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: khodat-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    ports:
      - "8095:80"
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  khodat-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  es-data:
  minio-data:
  backend-vendor:
  sandat-vendor:
