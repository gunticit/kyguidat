services:
  # PHP + Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: khodat-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - khodat-network
    depends_on:
      - mysql
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: khodat-nginx
    restart: unless-stopped
    ports:
      - "8015:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - khodat-network
    depends_on:
      - backend

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: khodat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: khodat
      MYSQL_USER: khodat
      MYSQL_PASSWORD: khodat123
    ports:
      - "3321:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - khodat-network

  # Redis for Cache & Sessions
  redis:
    image: redis:alpine
    container_name: khodat-redis
    restart: unless-stopped
    ports:
      - "6394:6379"
    volumes:
      - redis-data:/data
    networks:
      - khodat-network

  # phpMyAdmin (optional, for database management)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: khodat-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8095:80"
    networks:
      - khodat-network
    depends_on:
      - mysql

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: khodat-frontend
    restart: unless-stopped
    ports:
      - "3015:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8015/api
    networks:
      - khodat-network
    depends_on:
      - nginx

networks:
  khodat-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
