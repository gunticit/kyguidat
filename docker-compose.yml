services:
  # ===========================================
  # GOLANG API GATEWAY
  # ===========================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: khodat-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=khodat
      - DB_USERNAME=khodat
      - DB_PASSWORD=khodat123
      - JWT_SECRET=your-super-secret-jwt-key
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy

  # ===========================================
  # LARAVEL SÀN ĐẤT (Public Website)
  # ===========================================
  san-dat:
    build:
      context: ./san-dat
      dockerfile: Dockerfile
    container_name: khodat-san-dat
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      - GOLANG_API_URL=http://api-gateway:8080
    networks:
      - khodat-network
    depends_on:
      - api-gateway

  # ===========================================
  # VUE ADMIN DASHBOARD
  # ===========================================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: khodat-admin
    restart: unless-stopped
    ports:
      - "8089:80"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    networks:
      - khodat-network
    depends_on:
      - api-gateway

  # ===========================================
  # LARAVEL BACKEND (User API)
  # ===========================================
  backend:
    build:
      context: ./clients/backend
      dockerfile: Dockerfile
    container_name: khodat-backend
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8015:8000"
    volumes:
      - ./clients/backend:/var/www
      - ./clients/backend/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - khodat-network
    depends_on:
      - mysql
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  # ===========================================
  # NEXT.JS FRONTEND (User Dashboard)
  # ===========================================
  frontend:
    build:
      context: ./clients/frontend
      dockerfile: Dockerfile
    container_name: khodat-frontend
    restart: unless-stopped
    ports:
      - "3015:3000"
    volumes:
      - ./clients/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8015/api
    networks:
      - khodat-network
    depends_on:
      - backend

  # ===========================================
  # DATABASE & CACHE
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: khodat-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: khodat
      MYSQL_USER: khodat
      MYSQL_PASSWORD: khodat123
    ports:
      - "3321:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - khodat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: khodat-redis
    restart: unless-stopped
    ports:
      - "6394:6379"
    volumes:
      - redis-data:/data
    networks:
      - khodat-network
    command: redis-server --appendonly yes

  # ===========================================
  # TOOLS & UTILITIES
  # ===========================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: khodat-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    ports:
      - "8095:80"
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  khodat-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
