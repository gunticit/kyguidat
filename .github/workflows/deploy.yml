name: Build & Push Docker Images

on:
  push:
    branches:
      - pre-main
    paths:
      - 'api-gateway/**'
      - 'clients/backend/**'
      - 'clients/frontend/**'
      - 'admin/**'
      - 'san-dat/**'
      - 'socket/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g. 1.2.3). Defaults to git short SHA.'
        required: false
      service:
        description: 'Build specific service only (leave empty to build all)'
        required: false
        type: choice
        options:
          - all
          - api-gateway
          - backend
          - frontend
          - admin
          - san-dat
          - socket

env:
  IMAGE_NAME: hungdoanit95/hubs
  APP_NAME: khodat

jobs:
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
            dockerfile: ./api-gateway/Dockerfile
            build-args: ''
          - service: backend
            context: ./clients/backend
            dockerfile: ./clients/backend/Dockerfile.prod
            build-args: ''
          - service: socket
            context: ./socket
            dockerfile: ./socket/Dockerfile
            build-args: ''
          - service: san-dat
            context: ./san-dat
            dockerfile: ./san-dat/Dockerfile
            build-args: ''
          - service: frontend
            context: ./clients/frontend
            dockerfile: ./clients/frontend/Dockerfile.prod
            build-args: |
              NEXT_PUBLIC_API_URL=https://backend.khodat.com/api
              NEXT_PUBLIC_SOCKET_URL=https://socket.khodat.com
              NEXT_PUBLIC_APP_NAME=Khodat
              NEXT_PUBLIC_GOOGLE_LOGIN_URL=https://api.khodat.com/api/auth/google
              NEXT_PUBLIC_FACEBOOK_LOGIN_URL=https://api.khodat.com/api/auth/facebook
              NEXT_PUBLIC_ZALO_LOGIN_URL=https://api.khodat.com/api/auth/zalo
              NEXT_PUBLIC_GITHUB_LOGIN_URL=https://backend.khodat.com/api/auth/github
          - service: admin
            context: ./admin
            dockerfile: ./admin/Dockerfile
            build-args: |
              VITE_API_URL=https://api.khodat.com/api
              VITE_SANDAT_API_URL=https://khodat.com/api
              VITE_ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}

    steps:
      - name: Check if should run
        id: check
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ -z "$SERVICE" ] || [ "$SERVICE" = "all" ] || [ "$SERVICE" = "${{ matrix.service }}" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping ${{ matrix.service }} (only building $SERVICE)"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set image tag
        if: steps.check.outputs.skip != 'true'
        id: tag
        run: |
          LATEST="${{ env.IMAGE_NAME }}:${{ env.APP_NAME }}-${{ matrix.service }}-latest"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi
          VERSIONED="${{ env.IMAGE_NAME }}:${{ env.APP_NAME }}-${{ matrix.service }}-$TAG"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$VERSIONED"
            echo "$LATEST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Summary
        if: steps.check.outputs.skip != 'true'
        run: |
          {
            echo "### ✅ ${{ matrix.service }} pushed successfully"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.tag.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only trigger redeploy when ALL builds succeeded. Prevents partial deploys
    # where backend image is updated but frontend image is stale (or vice-versa).
    if: success()

    steps:
      - name: Trigger Dokploy redeploy
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DOKPLOY_WEBHOOK_URL not set, skipping redeploy"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL")
          echo "Webhook returned HTTP $STATUS"
          case "$STATUS" in
            2*) echo "Dokploy redeploy triggered" ;;
            *) echo "Dokploy redeploy failed (HTTP $STATUS)"; exit 1 ;;
          esac
