name: Build & Push API Docker Image

on:
  push:
    branches:
      - pre-main
    # paths:
    #   - 'apps/api/**'
    #   - 'packages/api/**'
    #   - 'packages/core/**'
    #   - 'packages/typescript-config/**'
    #   - 'pnpm-lock.yaml'
    #   - '.github/workflows/docker-publish-api.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g. 1.2.3). Defaults to git short SHA.'
        required: false

env:
  IMAGE_NAME: hungdoanit95/hubs
  APP_NAME: khodat

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: dockerhub
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          LATEST="${{ env.IMAGE_NAME }}:${{ env.APP_NAME }}-latest"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSIONED="${{ env.IMAGE_NAME }}:${{ env.APP_NAME }}-${{ github.event.inputs.tag }}"
            {
              echo "tags<<EOF"
              echo "$VERSIONED"
              echo "$LATEST"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            printf 'tags=%s\n' "$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max