# ===========================================
# DOCKER COMPOSE PRODUCTION
# ===========================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env.production file with secrets

services:
  # ===========================================
  # OPENCART ADMIN (PHP 8 + Nginx)
  # ===========================================

  # PHP-FPM for OpenCart Admin
  admin-php:
    build:
      context: ./admin/docker
      dockerfile: Dockerfile.prod
    container_name: khodat-admin-php
    restart: always
    expose:
      - "9000"
    volumes:
      - ./admin:/var/www/html:ro
      - admin-cache:/var/www/html/system/storage/cache
      - admin-logs:/var/www/html/system/storage/logs
    environment:
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=0
      - DB_HOST=mysql
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: [ "CMD-SHELL", "php-fpm-healthcheck || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx for OpenCart Admin
  admin-nginx:
    image: nginx:alpine
    container_name: khodat-admin-nginx
    restart: always
    ports:
      - "8088:80"
    volumes:
      - ./admin:/var/www/html:ro
      - ./admin/docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - khodat-network
    depends_on:
      - admin-php
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # LARAVEL BACKEND (kyguidat API)
  # ===========================================

  # PHP-FPM for Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: khodat-backend
    restart: always
    working_dir: /var/www
    expose:
      - "9000"
    volumes:
      - ./backend:/var/www:ro
      - backend-storage:/var/www/storage
      - backend-cache:/var/www/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - REDIS_HOST=redis
    env_file:
      - ./backend/.env.production
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "php-fpm-healthcheck || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Web Server for Laravel
  backend-nginx:
    image: nginx:alpine
    container_name: khodat-backend-nginx
    restart: always
    ports:
      - "8015:80"
    volumes:
      - ./backend:/var/www:ro
      - ./backend/docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - khodat-network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # DATABASE & CACHE
  # ===========================================

  # MySQL Database (shared by OpenCart and Laravel)
  mysql:
    image: mysql:8.0
    container_name: khodat-mysql
    restart: always
    command: >
      --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=256M --max-connections=200 --slow-query-log=1 --slow-query-log-file=/var/log/mysql/slow.log --long-query-time=2
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-khodat}
      MYSQL_USER: ${MYSQL_USER:-khodat}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Không expose port ra ngoài trong production
    # ports:
    #   - "3321:3306"
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-logs:/var/log/mysql
      - ./backend/docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./admin/docker/init-opencart.sql:/docker-entrypoint-initdb.d/02-opencart.sql:ro
    networks:
      - khodat-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Redis for Cache & Sessions
  redis:
    image: redis:alpine
    container_name: khodat-redis
    restart: always
    # Không expose port ra ngoài trong production
    # ports:
    #   - "6394:6379"
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - khodat-network
    command: >
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # TOOLS & UTILITIES (Disabled in Production)
  # ===========================================

  # phpMyAdmin - KHÔNG CHẠY TRONG PRODUCTION
  # Nếu cần truy cập database, sử dụng SSH tunnel
  # ssh -L 3306:localhost:3306 user@server
  # phpmyadmin:
  #   image: phpmyadmin:latest
  #   container_name: khodat-phpmyadmin
  #   ...

  # ===========================================
  # NEXT.JS FRONTEND
  # ===========================================

  # Next.js Frontend (Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.khodat.com/api}
    container_name: khodat-frontend
    restart: always
    ports:
      - "3015:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.khodat.com/api}
    networks:
      - khodat-network
    depends_on:
      - backend-nginx
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  khodat-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  mysql-data:
    driver: local
  mysql-logs:
    driver: local
  redis-data:
    driver: local
  admin-cache:
    driver: local
  admin-logs:
    driver: local
  backend-storage:
    driver: local
  backend-cache:
    driver: local
