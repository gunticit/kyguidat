# ===========================================
# PRODUCTION DOCKER COMPOSE - kyguidatvuon.com
# ===========================================
# Sử dụng với Nginx đã cài sẵn trên host Ubuntu
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  # ===========================================
  # GOLANG API GATEWAY
  # ===========================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: khodat-api-gateway
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=http://backend-nginx:80
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # ===========================================
  # LARAVEL SÀN ĐẤT (Public Website)
  # ===========================================
  san-dat:
    build:
      context: ./san-dat
      dockerfile: Dockerfile
    container_name: khodat-san-dat
    restart: always
    ports:
      - "127.0.0.1:8088:80"
    environment:
      - GOLANG_API_URL=http://api-gateway:8080
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=https://kyguidatvuon.com
      - APP_URL_SANDAT=https://app.kyguidatvuon.com
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - sandat-storage:/var/www/html/storage/app
    networks:
      - khodat-network
    depends_on:
      - api-gateway

  # ===========================================
  # VUE ADMIN DASHBOARD
  # ===========================================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.kyguidatvuon.com/api
        - VITE_SANDAT_API_URL=https://kyguidatvuon.com/api
    container_name: khodat-admin
    restart: always
    ports:
      - "127.0.0.1:8089:80"
    networks:
      - khodat-network
    depends_on:
      - api-gateway

  # ===========================================
  # LARAVEL BACKEND (User API) - PHP-FPM
  # ===========================================
  backend:
    build:
      context: ./clients/backend
      dockerfile: Dockerfile.prod
    container_name: khodat-backend
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=https://backend.kyguidatvuon.com
      - FRONTEND_URL=https://app.kyguidatvuon.com
      - APP_URL_SANDAT=https://app.kyguidatvuon.com
      - APP_URL_ADMIN=https://admin.kyguidatvuon.com
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      # SMTP Mail (Email Verification)
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@kyguidatvuon.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Ky Gui Dat Vuon}
      # VNPay
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
      - VNPAY_URL=${VNPAY_URL}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL}
      # MoMo
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
      - MOMO_ENDPOINT=${MOMO_ENDPOINT}
      - MOMO_RETURN_URL=${MOMO_RETURN_URL}
      - MOMO_NOTIFY_URL=${MOMO_NOTIFY_URL}
      # Social Auth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      # MinIO / S3 Storage
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-khodat_minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-khodat_minio_secret}
      - AWS_DEFAULT_REGION=ap-southeast-1
      - AWS_BUCKET=${MINIO_BUCKET:-khodat}
      - AWS_URL=${MINIO_PUBLIC_URL:-https://storage.kyguidatvuon.com/khodat}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - IMAGE_QUALITY=80
      - IMAGE_FORMAT=webp
    networks:
      - khodat-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  # ===========================================
  # NGINX FOR LARAVEL BACKEND (PHP-FPM proxy)
  # ===========================================
  backend-nginx:
    image: nginx:alpine
    container_name: khodat-backend-nginx
    restart: always
    ports:
      - "127.0.0.1:8015:80"
    volumes:
      - ./clients/backend:/var/www:ro
      - ./clients/backend/docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - khodat-network
    depends_on:
      - backend

  # ===========================================
  # NEXT.JS FRONTEND (User Dashboard)
  # ===========================================
  frontend:
    build:
      context: ./clients/frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=https://backend.kyguidatvuon.com/api
        - NEXT_PUBLIC_SOCKET_URL=https://socket.kyguidatvuon.com
    container_name: khodat-frontend
    restart: always
    ports:
      - "127.0.0.1:3015:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://backend.kyguidatvuon.com/api
      - NEXT_PUBLIC_SOCKET_URL=https://socket.kyguidatvuon.com
    networks:
      - khodat-network
    depends_on:
      - backend

  # ===========================================
  # DATABASE
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: khodat-mysql
    restart: always
    command: --default-authentication-plugin=caching_sha2_password
    ports:
      - "127.0.0.1:3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - khodat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # CACHE
  # ===========================================
  redis:
    image: redis:alpine
    container_name: khodat-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - khodat-network

  # ===========================================
  # MINIO (S3-Compatible Object Storage)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: khodat-minio
    restart: always
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9002:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-khodat_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-khodat_minio_secret}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - khodat-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # ELASTICSEARCH (Full-text Search)
  # ===========================================
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: khodat-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - khodat-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===========================================
  # SOCKET.IO SERVER (Real-time Support Chat)
  # ===========================================
  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
    container_name: khodat-socket
    restart: always
    ports:
      - "127.0.0.1:3020:3020"
    environment:
      - PORT=3020
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CORS_ORIGINS=https://app.kyguidatvuon.com,https://admin.kyguidatvuon.com
    networks:
      - khodat-network
    depends_on:
      - redis
      - backend

networks:
  khodat-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  es-data:
  minio-data:
  sandat-storage:
