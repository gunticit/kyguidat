<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khodat - Đang ngoại tuyến</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 400px; }
        .icon {
            width: 80px; height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .icon svg { width: 40px; height: 40px; color: white; }
        h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #f1f5f9; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; border: none; padding: 0.75rem 2rem;
            border-radius: 0.75rem; font-size: 1rem; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01"/>
            </svg>
        </div>
        <h1>Không có kết nối mạng</h1>
        <p>Vui lòng kiểm tra kết nối internet và thử lại.</p>
        <button onclick="location.reload()">Thử lại</button>
    </div>
</body>
</html>
