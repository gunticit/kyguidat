# =============================================================================
# Khodat phpMyAdmin - Nginx Configuration
# Domain: pma.khodat.com
# Port: 8095
# =============================================================================

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pma.khodat.com;
    
    return 301 https://$server_name$request_uri;
}

# HTTPS - Main Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pma.khodat.com;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/pma.khodat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pma.khodat.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logging
    access_log /var/log/nginx/pma.khodat.com.access.log;
    error_log /var/log/nginx/pma.khodat.com.error.log;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate Limiting (strict for security)
    limit_req zone=api_limit burst=10 nodelay;

    # Max upload size (for database imports)
    client_max_body_size 200M;
    client_body_buffer_size 50M;

    # Main Location - Proxy to phpMyAdmin
    location / {
        proxy_pass http://127.0.0.1:8095;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts (longer for large queries/imports)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Static files
    location ~* \.(css|js|gif|png|ico)$ {
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # IP Restriction (uncomment and modify for production)
    # Allow only specific IPs to access phpMyAdmin
    # allow 123.45.67.89;   # Your office IP
    # allow 192.168.1.0/24; # Local network
    # deny all;
}
