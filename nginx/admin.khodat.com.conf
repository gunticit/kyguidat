# =============================================================================
# Khodat Admin (OpenCart) - Nginx Configuration
# Domain: admin.khodat.com
# Port: 8088 (PHP built-in server)
# =============================================================================

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name admin.khodat.com;
    
    return 301 https://$server_name$request_uri;
}

# HTTPS - Main Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.khodat.com;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/admin.khodat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.khodat.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logging
    access_log /var/log/nginx/admin.khodat.com.access.log;
    error_log /var/log/nginx/admin.khodat.com.error.log;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max upload size (for product images)
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_proxied any;
    gzip_comp_level 6;

    # Main Location - Proxy to OpenCart Admin
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts (longer for admin operations)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Static files - images, css, js
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|woff|woff2|ttf|svg|eot)$ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Product images
    location /image {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Download files
    location /download {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to config files
    location ~* \.(ini|log|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
