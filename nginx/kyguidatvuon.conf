# ===========================================
# kyguidatvuon.com - Host Nginx Reverse Proxy
# ===========================================
# Copy: sudo cp nginx/kyguidatvuon.conf /etc/nginx/sites-available/kyguidat.conf
# Enable: sudo ln -sf /etc/nginx/sites-available/kyguidat.conf /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d kyguidatvuon.com -d www.kyguidatvuon.com -d api.kyguidatvuon.com -d admin.kyguidatvuon.com -d app.kyguidatvuon.com -d backend.kyguidatvuon.com -d socket.kyguidatvuon.com

# --- Main Website: kyguidatvuon.com → san-dat ---
server {
    listen 80;
    server_name kyguidatvuon.com www.kyguidatvuon.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# --- API Gateway: api.kyguidatvuon.com → api-gateway ---
server {
    listen 80;
    server_name api.kyguidatvuon.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# --- Admin Dashboard: admin.kyguidatvuon.com → admin ---
server {
    listen 80;
    server_name admin.kyguidatvuon.com;

    location / {
        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# --- User Frontend: app.kyguidatvuon.com → frontend ---
server {
    listen 80;
    server_name app.kyguidatvuon.com;

    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# --- Backend API: backend.kyguidatvuon.com → backend-nginx ---
server {
    listen 80;
    server_name backend.kyguidatvuon.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# --- Socket.IO: socket.kyguidatvuon.com → socket ---
server {
    listen 80;
    server_name socket.kyguidatvuon.com;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
