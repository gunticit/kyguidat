# ===========================================
# kyguidatvuon.com - Host Nginx Config
# ===========================================
# Copy file này vào /etc/nginx/sites-available/kyguidatvuon.conf
# Sau đó: sudo ln -s /etc/nginx/sites-available/kyguidatvuon.conf /etc/nginx/sites-enabled/
# SSL sẽ được certbot tự thêm vào

# --- Main Website: kyguidatvuon.com → san-dat ---
server {
    listen 80;
    server_name kyguidatvuon.com www.kyguidatvuon.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- API Gateway: api.kyguidatvuon.com → api-gateway ---
server {
    listen 80;
    server_name api.kyguidatvuon.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}

# --- Admin Dashboard: admin.kyguidatvuon.com → admin ---
server {
    listen 80;
    server_name admin.kyguidatvuon.com;

    location / {
        proxy_pass http://127.0.0.1:8089;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- User Frontend: app.kyguidatvuon.com → frontend ---
server {
    listen 80;
    server_name app.kyguidatvuon.com;

    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- Backend API: backend.kyguidatvuon.com → backend-nginx ---
server {
    listen 80;
    server_name backend.kyguidatvuon.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8015;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        add_header Access-Control-Allow-Origin "https://app.kyguidatvuon.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}

# --- Socket.IO: socket.kyguidatvuon.com → socket ---
server {
    listen 80;
    server_name socket.kyguidatvuon.com;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Socket.IO)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-polling timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
