# =============================================================================
# Khodat Backend API - Nginx Configuration
# Domain: api.khodat.com
# =============================================================================

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.khodat.com;
    
    return 301 https://$server_name$request_uri;
}

# HTTPS - Main Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.khodat.com;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.khodat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.khodat.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logging
    access_log /var/log/nginx/api.khodat.com.access.log;
    error_log /var/log/nginx/api.khodat.com.error.log;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max upload size (for file uploads)
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_types application/json application/javascript text/plain text/css text/xml text/javascript;
    gzip_proxied any;
    gzip_comp_level 6;

    # Main Location - Proxy to Laravel API
    location / {
        proxy_pass http://localhost:8015;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # CORS Headers (for multiple origins support)
        set $cors_origin "";
        if ($http_origin ~* "^https://(khodat\.com|www\.khodat\.com|admin\.khodat\.com)$") {
            set $cors_origin $http_origin;
        }
        
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type, X-Requested-With, X-CSRF-TOKEN' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 3600 always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type, X-Requested-With, X-CSRF-TOKEN';
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Storage files - Laravel public storage
    location /storage {
        proxy_pass http://localhost:8015;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Health check endpoint
    location /api/health {
        proxy_pass http://localhost:8015;
        access_log off;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Rate Limiting for login/register endpoints
    location ~ ^/api/(auth/login|auth/register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://localhost:8015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Rate limiting zone (add to http block in nginx.conf)
# limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
